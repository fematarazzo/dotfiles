# ~/.tmux.conf
# prefix inherited from screen. Ctrl-B clashes with emacs/bash.

# ── prefix ─────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── behavior ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g mouse on                       # I caved on this. productivity wins.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on

# ── bindings ───────────────────────────────────────────
# reload config
bind r source-file ~/.tmux.conf \; display "tmux: reloaded."

# split keeping cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize with H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── visual ─────────────────────────────────────────────
# muted grey. no neon.
set -g status-style "bg=#3a3a3a,fg=#d0d0d0"
set -g status-left "[#S] "
set -g status-right "%Y-%m-%d %H:%M "
set -g status-left-length 30
set -g status-right-length 30
setw -g window-status-current-style "bg=#5f8787,fg=#ffffff,bold"
setw -g window-status-style "fg=#a8a8a8"

# pane borders
set -g pane-border-style "fg=#5a5a5a"
set -g pane-active-border-style "fg=#5f8787"

# ── vim-style copy mode ────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# ── new window with C-t ────────────────────────────────
bind -n C-t new-window -c "#{pane_current_path}"
