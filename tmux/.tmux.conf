# ~/.tmux.conf
# Lufa-Lufa style: no plugins, no TPM. Pure native tmux.
# Comments explain WHY.

# ── prefix ─────────────────────────────────────────────
# C-a inherited from GNU screen (1980s heritage).
# C-b clashes with readline's "back one char" in shell/insert mode.
unbind C-b
set -g prefix C-a
bind C-a send-prefix              # press C-a twice to send literal C-a

# ── behavior ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

set -g history-limit 50000        # 50k lines of scrollback
set -g mouse on                   # I caved on this. productivity wins.
set -g base-index 1               # windows start at 1
setw -g pane-base-index 1         # panes too
set -g renumber-windows on        # renumber after closing
set -g escape-time 10             # responsive in nvim (default is 500ms!)
set -g focus-events on            # let nvim detect focus (autosave plugins)
setw -g aggressive-resize on      # only resize the active window

# OSC 52 clipboard: tmux writes selections to the terminal's clipboard via
# escape codes. Works through SSH too. Ghostty supports it.
set -g set-clipboard on
set -g allow-passthrough on       # allow apps inside tmux to use OSC sequences

# ── reload config ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux: reloaded."

# ── splits keep cwd ────────────────────────────────────
# the defaults ('"' = horizontal, '%' = vertical) are unmemorable.
# Use '-' and '|' which look like the split they create.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── pane navigation (vim-style, with prefix) ───────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── seamless pane navigation (no prefix, vim-aware) ────
# When in a vim/nvim pane, C-h/j/k/l moves between vim windows.
# When in any other pane, C-h/j/k/l moves between tmux panes.
# Reimplements vim-tmux-navigator behavior without a plugin.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ── pane resize (repeatable: hold prefix once, press H/J/K/L repeatedly) ──
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── window navigation ──────────────────────────────────
# Native prefix+N (e.g. C-a 1) already jumps to window N — built-in tmux.
# Avoiding Alt-N because macOS Option produces typographic chars (¡™£¢)
# unless macos-option-as-alt is set in Ghostty (which fights muscle memory).
#
# Quick switching: C-a n (next) / C-a p (prev) — both default.
# Or use C-a w to interactive-pick from a list (also default).

# new window with current path
bind c new-window -c "#{pane_current_path}"

# rename window
bind , command-prompt "rename-window '%%'"

# ── copy mode: vim keys + macOS pbcopy ─────────────────
setw -g mode-keys vi

# enter copy mode with prefix [
# vim motions: h/j/k/l, w/b, /search, n/N, gg/G
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# paste from system clipboard (macOS pbpaste)
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ── kill pane / window with confirmation ───────────────
bind x confirm-before -p "kill pane #P? (y/n)" kill-pane
bind & confirm-before -p "kill window #W? (y/n)" kill-window

# ── status line: muted gray, no nerd font ──────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#3a3a3a,fg=#d0d0d0"

# left: session name in brackets
set -g status-left "#[fg=#83a598,bold][#S]#[fg=default] "
set -g status-left-length 30

# right: date + time
set -g status-right "#[fg=#a8a8a8]%Y-%m-%d %H:%M "
set -g status-right-length 30

# window status
setw -g window-status-style "fg=#a8a8a8"
setw -g window-status-current-style "bg=#5f8787,fg=#ffffff,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# pane borders
set -g pane-border-style "fg=#5a5a5a"
set -g pane-active-border-style "fg=#5f8787"

# command line / messages
set -g message-style "bg=#3a3a3a,fg=#fabd2f"
set -g message-command-style "bg=#3a3a3a,fg=#fabd2f"

# clock mode (prefix t)
setw -g clock-mode-colour "#83a598"
setw -g clock-mode-style 24

# ── visual bell instead of beep ────────────────────────
set -g bell-action any
set -g visual-bell on
setw -g monitor-activity off       # don't flash on bg activity
