[defaults]
inventory = ~/ansible/inventory
roles_path = ~/ansible/roles
collections_path = ~/ansible/collections
host_key_checking = True
retry_files_enabled = False
forks = 10
stdout_callback = yaml
nocows = 1                          # no ascii cow
interpreter_python = auto_silent
deprecation_warnings = True
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ~/.cache/ansible/facts
fact_caching_timeout = 3600

[privilege_escalation]
become = False                      # opt-in per playbook, not by default
become_method = sudo
become_ask_pass = False

[ssh_connection]
pipelining = True                   # faster; needs requiretty=no in sudoers
ssh_args = -o ControlMaster=auto -o ControlPersist=600s
control_path = ~/.ssh/sockets/ansible-%%r@%%h:%%p

[diff]
always = True                       # always show the diff
context = 3
