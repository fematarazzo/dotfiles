# plain video, no fluff

# ── visual ─────────────────────────────────────────────
osc=yes
osd-bar=yes
osd-font-size=24
keep-open=yes                  # don't auto-quit at end of file

# ── video ──────────────────────────────────────────────
profile=gpu-hq                 # decent quality without cooking the CPU
hwdec=auto-safe                # hardware decode when available
vo=gpu

# ── audio ──────────────────────────────────────────────
volume=70
volume-max=150                 # for when the film's audio is weak
audio-channels=stereo
audio-pitch-correction=yes

# ── subtitles ──────────────────────────────────────────
sub-auto=fuzzy                 # find subs even with mismatched names
slang=en,pt-BR,pt
sub-font-size=42
sub-color="#ffffff"
sub-border-color="#000000"
sub-border-size=3
sub-shadow-offset=1
sub-shadow-color="#33000000"

# ── screenshots ────────────────────────────────────────
screenshot-directory=~/Pictures/screenshots
screenshot-format=png
screenshot-template="mpv-%F-%P"

# ── streaming cache ────────────────────────────────────
cache=yes
cache-secs=120
