# dconf dump of Cinnamon settings
# apply with:  dconf load / < dconf-settings.ini
#
# values chosen for HiDPI + a calm look

# ══ cinnamon shell ══════════════════════════════════════
[org/cinnamon]
panels-enabled=['1:0:bottom']
panels-height=['1:32']
panels-autohide=['1:false']
enabled-applets=['panel1:left:0:menu@cinnamon.org', 'panel1:left:1:show-desktop@cinnamon.org', 'panel1:left:2:grouped-window-list@cinnamon.org', 'panel1:right:0:systray@cinnamon.org', 'panel1:right:1:xapp-status@cinnamon.org', 'panel1:right:2:keyboard@cinnamon.org', 'panel1:right:3:notifications@cinnamon.org', 'panel1:right:4:printers@cinnamon.org', 'panel1:right:5:removable-drives@cinnamon.org', 'panel1:right:6:network@cinnamon.org', 'panel1:right:7:sound@cinnamon.org', 'panel1:right:8:power@cinnamon.org', 'panel1:right:9:calendar@cinnamon.org']
desktop-effects=false
desktop-effects-on-dialogs=false
desktop-effects-on-menus=false
desktop-effects-workspace=false
startup-animation=false
startup-icon=''
alttab-switcher-style='icons+thumbnails'
alttab-switcher-show-all-workspaces=false
hotcorner-layout=['expo:false:0', 'scale:false:0', 'scale:false:0', 'desktop:false:0']
workspace-osd-visible=false

# ══ menu ═══════════════════════════════════════════════
[org/cinnamon/applets/menu@cinnamon-org]
menu-icon-size=22
menu-label=''
show-favorites=true
show-places=false
show-recent=false

# ══ clock ══════════════════════════════════════════════
[org/cinnamon/applets/calendar@cinnamon-org]
use-custom-format=true
custom-format='%Y-%m-%d %H:%M'
show-week-numbers=true

# ══ shell theme ════════════════════════════════════════
[org/cinnamon/theme]
name='Mint-Y'

# ══ interface (GTK, icons, fonts) ═══════════════════════
[org/cinnamon/desktop/interface]
gtk-theme='Mint-Y'
icon-theme='Papirus'
cursor-theme='DMZ-White'
cursor-size=32
font-name='Noto Sans 10'
toolkit-accessibility=false
clock-show-date=true
clock-show-seconds=false
clock-use-24h=true

# ══ window manager ═════════════════════════════════════
[org/cinnamon/desktop/wm/preferences]
titlebar-font='Noto Sans Medium 10'
button-layout=':minimize,maximize,close'
focus-mode='click'
mouse-button-modifier='<Super>'
num-workspaces=4
audible-bell=false
visual-bell=false

# ══ muffin (compositor) ═════════════════════════════════
[org/cinnamon/muffin]
attach-modal-dialogs=true
center-new-windows=true
draggable-border-width=8
edge-tiling=true
placement-mode='automatic'
unredirect-fullscreen-windows=true
experimental-features=['scale-monitor-framebuffer']
workspaces-only-on-primary=false

# ══ power ══════════════════════════════════════════════
[org/cinnamon/settings-daemon/plugins/power]
sleep-display-ac=1200
sleep-display-battery=600
sleep-inactive-ac-timeout=3600
sleep-inactive-battery-timeout=1200
sleep-inactive-ac-type='suspend'
sleep-inactive-battery-type='suspend'
lid-close-ac-action='suspend'
lid-close-battery-action='suspend'
button-power='interactive'
percentage-low=15
percentage-critical=5
percentage-action=2

# ══ keyboard (custom shortcuts) ═════════════════════════
[org/cinnamon/desktop/keybindings/wm]
close=['<Super>w']
maximize=['<Super>Up']
minimize=['<Super>Down']
toggle-fullscreen=['<Super>f']
switch-to-workspace-1=['<Super>1']
switch-to-workspace-2=['<Super>2']
switch-to-workspace-3=['<Super>3']
switch-to-workspace-4=['<Super>4']
move-to-workspace-1=['<Super><Shift>1']
move-to-workspace-2=['<Super><Shift>2']
move-to-workspace-3=['<Super><Shift>3']
move-to-workspace-4=['<Super><Shift>4']
push-tile-left=['<Super>Left']
push-tile-right=['<Super>Right']

[org/cinnamon/desktop/keybindings/media-keys]
www=['<Super>b']
email=['<Super>m']
home=['<Super>e']
terminal=['<Super>Return', '<Primary><Alt>t']
screensaver=['<Super>l']
screenshot=['Print']
area-screenshot=['<Shift>Print']
window-screenshot=['<Control>Print']

[org/cinnamon/desktop/keybindings]
custom-list=['custom0']

[org/cinnamon/desktop/keybindings/custom-keybindings/custom0]
name='nemo'
command='nemo'
binding=['<Super>e']

# ══ nemo (file manager) ═════════════════════════════════
[org/nemo/preferences]
show-hidden-files=false
show-image-thumbnails='local-only'
date-format='iso'
default-folder-viewer='list-view'
inherit-folder-viewer=true
confirm-trash=true
click-policy='double'
sort-directories-first=true

[org/nemo/desktop]
computer-icon-visible=false
home-icon-visible=false
network-icon-visible=false
trash-icon-visible=false
volumes-visible=false

# ══ privacy ════════════════════════════════════════════
[org/cinnamon/desktop/privacy]
remember-recent-files=false
recent-files-max-age=7
remove-old-temp-files=true
old-files-age=uint32 7

# ══ screensaver / lock ═════════════════════════════════
[org/cinnamon/desktop/screensaver]
lock-enabled=true
lock-delay=uint32 30
idle-activation-enabled=true
show-clock=true
clock-format='%Y-%m-%d %H:%M'

# ══ background ═════════════════════════════════════════
[org/cinnamon/desktop/background]
picture-uri='file:///home/felipe/Pictures/wallpaper.jpg'
picture-options='zoom'
primary-color='#3a3a3a'
secondary-color='#3a3a3a'

# ══ notifications ══════════════════════════════════════
[org/cinnamon/desktop/notifications]
display-notifications=true
notification-duration=4
remove-old=true

# ══ HiDPI / scaling ════════════════════════════════════
[org/cinnamon/desktop/interface]
scaling-factor=uint32 2

[org/gnome/desktop/interface]
text-scaling-factor=0.875

# ══ preferred apps ═════════════════════════════════════
[org/cinnamon/desktop/default-applications/terminal]
exec='xfce4-terminal'

[org/cinnamon/applications]
default-mime-application/x-shellscript='org.xfce.terminal.desktop'
